# Conveniencia para levantar el API con un solo comando: `docker compose up`.
# La API queda disponible en http://localhost:8080 (Swagger en la raiz).
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: couriermax-api:latest
    container_name: couriermax-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
    restart: unless-stopped
